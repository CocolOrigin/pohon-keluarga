<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga - Modern Family Tree</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- App Header Navbar -->
    <header class="app-header">
        <div class="header-brand">
            <i class="fa-solid fa-tree brand-icon"></i>
            <div>
                <h1>Silsilah Keluarga</h1>
                <p>Family Tree Explorer</p>
            </div>
        </div>

        <div class="header-actions">
            <!-- Toggle Mode Edit -->
            <div class="mode-toggle-container">
                <span class="mode-label"><i class="fa-solid fa-eye"></i> Mode Lihat</span>
                <label class="switch">
                    <input type="checkbox" id="modeEditToggle">
                    <span class="slider round"></span>
                </label>
                <span class="mode-label edit-label"><i class="fa-solid fa-pen-to-square"></i> Mode Edit</span>
            </div>

            <!-- Tambah Anggota Bebas (Leluhur Baru) -->
            <button id="btnAddNewPerson" class="btn btn-primary edit-only" style="display: none;">
                <i class="fa-solid fa-user-plus"></i> Tambah Leluhur
            </button>
        </div>
    </header>

    <!-- Canvas Workspace -->
    <main class="canvas-container" id="canvasContainer">
        <!-- Single Unified Viewport Container (SVG + Nodes Zoom Together Perfectly) -->
        <div id="treeViewport" class="tree-viewport">
            <svg id="svgLayer" class="tree-svg"></svg>
            <div id="treeNodes" class="tree-nodes"></div>
            <!-- Canvas Floating Action Buttons (Mode Edit) -->
            <div id="canvasActionsLayer" class="canvas-actions-layer"></div>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <p>Menghubungkan ke Google Sheet...</p>
        </div>

        <!-- Floating Controls Bar -->
        <div class="floating-controls">
            <div class="control-group">
                <button id="btnZoomOut" title="Zoom Out"><i class="fa-solid fa-minus"></i></button>
                <input type="range" id="zoomRange" min="0.3" max="2.0" step="0.05" value="1.0" title="Bar Geser Zoom">
                <button id="btnZoomIn" title="Zoom In"><i class="fa-solid fa-plus"></i></button>
                <button id="btnResetView" title="Reset Tampilan"><i class="fa-solid fa-compress"></i></button>
                <span id="zoomPercent" class="zoom-text">100%</span>
            </div>

            <div class="control-divider"></div>

            <div class="control-group">
                <button id="btnToggleStyleMenu" class="btn-icon-label" title="Pengaturan Garis & Frame">
                    <i class="fa-solid fa-sliders"></i> <span>Garis & Frame</span>
                </button>
            </div>
        </div>

        <!-- Popover Style Settings -->
        <div id="styleMenuPopover" class="popover-menu hidden">
            <div class="popover-header">
                <h4>Pengaturan Tampilan Canvas</h4>
                <button id="btnCloseStyleMenu"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="popover-body">
                <div class="setting-item">
                    <label for="strokeWidthSlider">Ketebalan Garis Hubung (<span id="valStrokeWidth">2</span>px)</label>
                    <input type="range" id="strokeWidthSlider" min="1" max="8" value="2">
                </div>
                <div class="setting-item">
                    <label for="outlineWidthSlider">Ketebalan Outline Foto (<span id="valOutlineWidth">3</span>px)</label>
                    <input type="range" id="outlineWidthSlider" min="1" max="8" value="3">
                </div>
                <div class="setting-item">
                    <label for="outlineGapSlider">Jarak Ring dari Foto (<span id="valOutlineGap">3</span>px)</label>
                    <input type="range" id="outlineGapSlider" min="1" max="10" value="3">
                </div>
            </div>
        </div>
    </main>

    <!-- Modal 1: Detail Anggota Keluarga -->
    <div id="detailModal" class="modal-backdrop hidden">
        <div class="modal-card detail-card" id="detailCardContent"></div>
    </div>

    <!-- Modal 2: Form Input / Edit Anggota -->
    <div id="formModal" class="modal-backdrop hidden">
        <div class="modal-card form-card">
            <div class="modal-header">
                <h3 id="formModalTitle"><i class="fa-solid fa-user-plus"></i> Tambah Anggota Keluarga</h3>
                <button class="btn-close-modal" id="btnCloseFormModal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="personForm">
                <input type="hidden" id="formId">

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Jenis Kelamin <span class="required">*</span></label>
                        <div class="gender-selector">
                            <button type="button" class="btn-gender btn-male" id="btnGenderL" data-value="L">
                                <i class="fa-solid fa-mars"></i> Laki-Laki
                            </button>
                            <button type="button" class="btn-gender btn-female" id="btnGenderP" data-value="P">
                                <i class="fa-solid fa-venus"></i> Perempuan
                            </button>
                        </div>
                        <input type="hidden" id="formJk" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="formPanggilan">Nama Panggilan (Di Atas/Tebal)</label>
                        <input type="text" id="formPanggilan" placeholder="Contoh: Mbah Kasiroen">
                    </div>
                    <div class="form-group">
                        <label for="formNama">Nama Lengkap <span class="required">*</span></label>
                        <input type="text" id="formNama" placeholder="Contoh: Kasiroen Soemo Wiyono" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="formAyah">Ayah</label>
                        <select id="formAyah"><option value="">-- Tanpa Ayah (Leluhur) --</option></select>
                    </div>
                    <div class="form-group">
                        <label for="formIbu">Ibu</label>
                        <select id="formIbu"><option value="">-- Tanpa Ibu (Leluhur) --</option></select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="formPasangan">Pasangan</label>
                        <select id="formPasangan"><option value="">-- Tidak Ada Pasangan --</option></select>
                    </div>
                    <div class="form-group">
                        <label for="formUrutan">Urutan Anak Ke-</label>
                        <input type="number" id="formUrutan" min="1" placeholder="1, 2, 3...">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="formTglLahir">Tanggal Lahir</label>
                        <input type="date" id="formTglLahir">
                    </div>
                    <div class="form-group">
                        <label for="formTglWafat">Tanggal Wafat (Kosongkan jika hidup)</label>
                        <input type="date" id="formTglWafat">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="formFoto">URL Foto (Kosongkan untuk avatar default)</label>
                    <input type="url" id="formFoto" placeholder="https://example.com/foto.jpg">
                </div>

                <div class="form-group full-width">
                    <label for="formCatatan">Catatan / Bio Singkat</label>
                    <textarea id="formCatatan" rows="3" placeholder="Informasi tambahan atau riwayat singkat..."></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btnCancelForm">Batal</button>
                    <button type="submit" class="btn btn-primary" id="btnSavePerson">
                        <i class="fa-solid fa-floppy-disk"></i> Simpan ke Google Sheet
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toastNotification" class="toast hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
