<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Silsilah Keluarga</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        
        /* Kontainer Utama Pohon */
        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            width: 100%;
            overflow-x: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .level {
            display: flex;
            justify-content: center;
            gap: 40px;
            position: relative;
        }

        /* Desain Node Sesuai Sketsa User */
        .family-node {
            display: flex;
            align-items: center;
            background: white;
            padding: 8px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
        }
        .family-node:hover {
            transform: translateY(-2px);
            border-color: #2196F3;
            box-shadow: 0 6px 12px rgba(33, 150, 243, 0.2);
        }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #e0e0e0;
            margin-right: 12px;
            border: 1px solid #ccc;
        }
        .nickname {
            font-weight: 600;
            color: #333;
            font-size: 15px;
            margin-right: 8px;
            white-space: nowrap;
        }
        .btn-add-node {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add-node:hover {
            background: #43A047;
        }

        /* Dialog Box / Pop-up Form Sesuai Sketsa */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 10px;
            box-sizing: border-box;
        }
        .modal-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            box-sizing: border-box;
        }
        .modal-box h3 { margin-top: 0; color: #2196F3; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-group input:disabled {
            background: #f0f0f0;
            border-color: #ddd;
            color: #666;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-primary { background: #2196F3; color: white; }
        .btn-primary:hover { background: #1E88E5; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d6d6d6; }
    </style>
</head>
<body>

    <h1>Pohon Silsilah Keluarga</h1>
    <div class="subtitle">Klik anggota keluarga untuk melihat/mengubah detail. Klik (+) untuk menambah keturunan.</div>
    
    <div id="tree" class="tree-container">Memuat data silsilah...</div>

    <!-- Dialog Box / Pop-up -->
    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">Detail Anggota Keluarga</h3>
            <form id="familyForm">
                <input type="hidden" id="actionType" value="tambah">
                
                <div class="form-group">
                    <label>Nama Lengkap (ID Unik - Tidak Bisa Diubah)</label>
                    <input type="text" id="inpNamaLengkap" required placeholder="Contoh: Ahmad Yusuf Setiawan">
                </div>
                <div class="form-group">
                    <label>Panggilan</label>
                    <input type="text" id="inpPanggilan" required placeholder="Contoh: Yusuf">
                </div>
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" id="inpTanggalLahir">
                </div>
                <div class="form-group">
                    <label>Tempat Tinggal</label>
                    <input type="text" id="inpTempatTinggal" placeholder="Kota tinggal sekarang">
                </div>
                <div class="form-group">
                    <label>Kontak / No. HP</label>
                    <input type="text" id="inpKontak" placeholder="08xxxxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Link Foto URL</label>
                    <input type="text" id="inpFotoURL" placeholder="https://link-foto.com/gambar.jpg">
                </div>
                
                <!-- Input Tersembunyi untuk Mengatur Hubungan Relasi -->
                <input type="hidden" id="inpAyah">
                <input type="hidden" id="inpIbu">
                <input type="hidden" id="inpPasangan">

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" id="btnSubmit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // URL aplikasi web deploy dari google sheet 
        const API_URL = "https://script.google.com/macros/s/AKfycbxRulVBJaZtjkXfDlKNi3pBc0H9b7Xu9BJ5gylSQiSXQZ0KBD13o82y136LDgszyDiy/exec"; 
        
        let familyData = [];

        // Ambil data otomatis dari Google Sheets
        async function fetchFamilyData() {
            try {
                const response = await fetch(API_URL);
                familyData = await response.json();
                renderTree();
            } catch (error) {
                document.getElementById('tree').innerText = "Gagal memuat data. Pastikan URL API sudah benar dan dideploy sebagai 'Anyone'.";
            }
        }

        // Render struktur tingkatan keluarga (Generasi)
        function renderTree() {
            const treeContainer = document.getElementById('tree');
            treeContainer.innerHTML = "";

            if(familyData.length === 0) {
                treeContainer.innerHTML = `<button class="btn btn-primary" onclick="openTambahRoot()">Tambah Anggota Pertama</button>`;
                return;
            }

            // Mencari generasi paling tua (yang kolom Ayah dan Ibu kosong di database)
            const generasi1 = familyData.filter(person => !person["Ayah"] && !person["Ibu"]);
            
            const level1Div = document.createElement('div');
            level1Div.className = "level";

            generasi1.forEach(person => {
                level1Div.appendChild(createNodeHTML(person));
            });

            treeContainer.appendChild(level1Div);
        }

        // Membuat elemen visual bundar + nama sesuai sketsa
        function createNodeHTML(person) {
            const node = document.createElement('div');
            node.className = "family-node";
            
            const foto = person["Foto URL"] || "https://www.w3schools.com/howto/img_avatar.png";
            node.innerHTML = `
                <img src="${foto}" class="avatar" alt="foto">
                <span class="nickname">${person["Panggilan"]}</span>
                <button class="btn-add-node" title="Tambah Anak">+</button>
            `;

            // Logic klik: Jika klik tombol (+) maka tambah anak, jika klik area lain maka lihat detail
            node.addEventListener('click', (e) => {
                if(e.target.className !== 'btn-add-node') {
                    openModeLihat(person);
                } else {
                    e.stopPropagation(); // Mencegah memicu klik pada node utama
                    openModeTambahAnak(person["Nama Lengkap"]);
                }
            });

            return node;
        }

        const modal = document.getElementById('modal');
        const form = document.getElementById('familyForm');
        const btnSubmit = document.getElementById('btnSubmit');

        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; form.reset(); }

        // Mode Tambah Anggota Paling Pertama/Tertua
        function openTambahRoot() {
            document.getElementById('actionType').value = "tambah";
            document.getElementById('inpNamaLengkap').disabled = false;
            setFormDisabled(false);
            btnSubmit.innerText = "Simpan";
            openModal();
        }

        // Mode Tambah Hubungan Anak
        function openModeTambahAnak(namaOrangTua) {
            document.getElementById('actionType').value = "tambah";
            document.getElementById('inpNamaLengkap').disabled = false;
            // Secara default, sistem mengarahkan nama pengklik ke kolom Ayah.
            // Keluarga bisa memindahkan ke kolom Ibu secara manual di Google Sheets jika yang diklik adalah Ibu.
            document.getElementById('inpAyah').value = namaOrangTua; 
            document.getElementById('inpIbu').value = "";
            setFormDisabled(false);
            btnSubmit.innerText = "Simpan";
            openModal();
        }

        // Mode Lihat Detail (Input Terkunci di Awal - Sesuai Permintaan)
        function openModeLihat(person) {
            document.getElementById('actionType').value = "ubah";
            
            document.getElementById('inpNamaLengkap').value = person["Nama Lengkap"];
            document.getElementById('inpNamaLengkap').disabled = true; // ID nama lengkap tidak boleh diubah untuk menjaga relasi
            document.getElementById('inpPanggilan').value = person["Panggilan"];
            document.getElementById('inpTanggalLahir').value = person["Tanggal Lahir"] ? person["Tanggal Lahir"].split('T')[0] : "";
            document.getElementById('inpTempatTinggal').value = person["Tempat Tinggal"];
            document.getElementById('inpKontak').value = person["Kontak"];
            document.getElementById('inpFotoURL').value = person["Foto URL"];
            document.getElementById('inpAyah').value = person["Ayah"];
            document.getElementById('inpIbu').value = person["Ibu"];
            document.getElementById('inpPasangan').value = person["Pasangan"];

            setFormDisabled(true);
            btnSubmit.innerText = "Mengubah"; // Menggunakan teks tombol sesuai permintaan Anda
            openModal();
        }

        // Mengunci atau membuka form ketik
        function setFormDisabled(status) {
            document.getElementById('inpPanggilan').disabled = status;
            document.getElementById('inpTanggalLahir').disabled = status;
            document.getElementById('inpTempatTinggal').disabled = status;
            document.getElementById('inpKontak').disabled = status;
            document.getElementById('inpFotoURL').disabled = status;
        }

        // Aksi Submit Form (Simpan/Ubah Data)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const action = document.getElementById('actionType').value;
            
            // Alur Logika Tombol Sesuai Permintaan Anda:
            // Jika tombol bertuliskan "Mengubah", buka kunci input agar bisa diketik, lalu ganti teks jadi "Simpan"
            if (btnSubmit.innerText === "Mengubah") {
                setFormDisabled(false);
                btnSubmit.innerText = "Simpan";
                return;
            }

            // Jika bertuliskan "Simpan", proses pengiriman data ke Google Sheets dimulai
            btnSubmit.innerText = "Memproses...";
            btnSubmit.disabled = true;

            const payload = {
                action: action,
                NamaLengkap: document.getElementById('inpNamaLengkap').value,
                Panggilan: document.getElementById('inpPanggilan').value,
                TanggalLahir: document.getElementById('inpTanggalLahir').value,
                TempatTinggal: document.getElementById('inpTempatTinggal').value,
                Kontak: document.getElementById('inpKontak').value,
                FotoURL: document.getElementById('inpFotoURL').value,
                Ayah: document.getElementById('inpAyah').value,
                Ibu: document.getElementById('inpIbu').value,
                Pasangan: document.getElementById('inpPasangan').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if(result.status === "success") {
                    alert("Data keluarga berhasil diperbarui!");
                    closeModal();
                    fetchFamilyData(); // Muat ulang visual pohon dengan data baru
                } else {
                    alert("Gagal menyimpan: " + result.message);
                }
            } catch (error) {
                alert("Terjadi masalah koneksi ke server database.");
            } finally {
                btnSubmit.disabled = false;
            }
        });

        // Load data saat web pertama kali diakses
        fetchFamilyData();
    </script>
</body>
</html>
